services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-cpp-server
    restart: unless-stopped
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ${MODELS_PATH:-C:/Users/Tobias/.cache/llama.cpp/models}:/models:ro
    ports:
      - "${PORT:-8080}:8080"
    command:
      - -m
      - ${MODEL:-/models/Qwen_Qwen3.5-35B-A3B-Q4_K_M.gguf}
      - --port
      - "8080"
      - --host
      - "0.0.0.0"
      # GPU offloading (12GB VRAM: ~15 layers for this model)
      - --n-gpu-layers
      - "${N_GPU_LAYERS:-15}"
      # Context window (48K recommended for coding)
      - -c
      - "${CTX_SIZE:-49152}"
      # Batch size for prompt processing
      - -b
      - "${BATCH_SIZE:-512}"
      # KV cache quantization - reduces memory usage
      - --cache-type-k
      - "${CACHE_TYPE:-q8_0}"
      - --cache-type-v
      - "${CACHE_TYPE:-q8_0}"
      # Metrics endpoint for monitoring
      - --metrics
    shm_size: 256m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
