services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-cpp-server
    restart: unless-stopped
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ${MODELS_PATH:-/home/weiss/.cache/llama.cpp/models}:/models:ro
    ports:
      - "${PORT:-8080}:8080"
    command:
      - -m
      - ${MODEL:-/models/qwen3.5-9b-q4_k_m.gguf}
      - --port
      - "8080"
      - --host
      - "0.0.0.0"
      # GPU offloading - 25 layers (adjust based on your GPU)
      - --n-gpu-layers
      - "25"
      # Context window - 32K tokens
      - -c
      - "${CTX_SIZE:-32768}"
      # Keep KV cache in CPU RAM to save GPU memory
      - -nkvo
      # KV cache quantization - q4_0 for memory efficiency
      - --cache-type-k
      - q4_0
      - --cache-type-v
      - q4_0
      # Disable warmup for faster startup
      - --no-warmup
      # Use Jinja template for Qwen
      - --jinja
    shm_size: 256m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
